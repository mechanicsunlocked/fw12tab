# fw12tab — Framework 12 tablet mode (Omarchy / Hyprland)
# Sourced from ~/.config/hypr/hyprland.conf by `fw12tab setup`:
#   source = /usr/share/fw12tab/fw12tab.conf

# Super+R toggles auto-rotation on/off
bind = SUPER, R, exec, fw12tab rotate-toggle

# Daemons: event-driven rotation + light hinge-angle tablet watcher
exec-once = fw12tab autorotate
exec-once = fw12tab tablet-watch

# Floating, draggable, always-on-top keyboard button (shown in tablet mode).
# `no_focus` is important: tapping it must NOT steal keyboard focus, so the
# on-screen keyboard types into the app you were actually using.
windowrule = float on,         match:class ^(org\.fw12\.OskButton)$
windowrule = pin on,           match:class ^(org\.fw12\.OskButton)$
windowrule = no_focus on,      match:class ^(org\.fw12\.OskButton)$
windowrule = border_size 0,    match:class ^(org\.fw12\.OskButton)$
windowrule = rounding 0,       match:class ^(org\.fw12\.OskButton)$
windowrule = size 60 60,       match:class ^(org\.fw12\.OskButton)$
windowrule = move (monitor_w-window_w-24) 48, match:class ^(org\.fw12\.OskButton)$
