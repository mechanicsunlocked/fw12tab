# fw12tab — Framework 12 tablet mode (Omarchy / Hyprland)
# Sourced from ~/.config/hypr/hyprland.conf by `fw12tab setup`:
#   source = /usr/share/fw12tab/fw12tab.conf

# Super+R toggles auto-rotation on/off
bind = SUPER, R, exec, fw12tab rotate-toggle

# Super+Shift+K toggles the on-screen keyboard — hardware-key fallback to dismiss
# it if the floating touch button is ever unavailable. (Super+K is taken by an
# existing Omarchy keybind, so Shift is added to avoid the clash.)
bind = SUPER SHIFT, K, exec, fw12tab osk-toggle

# Daemons: event-driven rotation + tablet-mode watcher (SW_TABLET_MODE switch)
exec-once = fw12tab autorotate
exec-once = fw12tab tablet-watch

# The on-screen-keyboard button is a Wayland layer-shell surface
# (namespace "fw12tab-osk"); it floats above windows, takes touch/pointer
# input, and never grabs keyboard focus, so no windowrules are needed.
