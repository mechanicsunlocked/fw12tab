<?xml version="1.0" encoding="UTF-8"?>
<!-- fw12tab OSK button mark: a white pinwheel evoking the Framework logo.
     This is an approximation; drop the official Framework SVG in its place
     (or point FW12TAB_OSK_ICON at one) to use the exact brand mark. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <g fill="#ffffff">
    <rect x="52" y="13" width="15" height="34" rx="7" transform="rotate(0 50 50)"/>
    <rect x="52" y="13" width="15" height="34" rx="7" transform="rotate(90 50 50)"/>
    <rect x="52" y="13" width="15" height="34" rx="7" transform="rotate(180 50 50)"/>
    <rect x="52" y="13" width="15" height="34" rx="7" transform="rotate(270 50 50)"/>
  </g>
</svg>
