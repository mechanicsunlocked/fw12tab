# Framework 12 tablet mode (IAW Framework KB "Tablet Mode and Screen Rotation
# on Linux"): load the Tiger Lake pin controller in the initramfs so it is up
# before soc_button_array probes. Otherwise the SW_TABLET_MODE switch (ACPI
# INT33D3 / gpio-keys) loses a boot probe race and comes up unbound, leaving no
# tablet-mode switch. soc_button_array itself autoloads normally afterwards.
MODULES+=(pinctrl_tigerlake)
